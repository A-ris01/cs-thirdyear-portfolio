name: .NET CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        # هذا السطر يخلي الـ GitHub يروح للمجلد الصح اللي بيه مشروعك
        working-directory: WebApplication Lec+Labs+Sources/WebApplication1

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '7.0.x'
    - name: Restore
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore